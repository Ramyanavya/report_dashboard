<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP — ReportPortal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f2ee; --surface: #fff; --border2: #d4cfc8;
  --text: #1a1916; --text2: #6b6760; --text3: #9c9890;
  --accent: #2d5a8e; --accent-light: #e8f0fb; --accent-dark: #1e3f66;
  --green: #3b6d11; --green-light: #eaf3de; --red: #a32d2d; --red-light: #fcebeb;
  --radius: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.box { background: var(--surface); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 440px; box-shadow: 0 8px 40px rgba(0,0,0,0.08); text-align: center; }
.icon { width: 64px; height: 64px; background: var(--accent-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
.icon svg { width: 28px; height: 28px; color: var(--accent); }
h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; margin-bottom: 0.5rem; }
.sub { color: var(--text2); font-size: 0.92rem; margin-bottom: 0.5rem; }
.email { color: var(--accent); font-weight: 600; font-size: 0.95rem; margin-bottom: 2rem; }
.otp-input { text-align: center; font-size: 2.2rem; font-weight: 600; letter-spacing: 0.6rem; width: 100%; padding: 16px; border: 2px solid var(--border2); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; outline: none; transition: border 0.2s; color: var(--text); background: var(--surface); }
.otp-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-light); }
.btn { width: 100%; padding: 13px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500; cursor: pointer; margin-top: 1.25rem; transition: background 0.2s; }
.btn:hover { background: var(--accent-dark); }
.messages { margin-bottom: 1.25rem; }
.message { padding: 10px 14px; border-radius: 8px; font-size: 0.875rem; margin-bottom: 8px; }
.message-success { background: var(--green-light); color: var(--green); }
.message-error { background: var(--red-light); color: var(--red); }
.back { display: block; margin-top: 1.25rem; font-size: 0.85rem; color: var(--text3); }
.back:hover { color: var(--accent); }
.timer { font-size: 0.82rem; color: var(--text3); margin-top: 1rem; }
.timer span { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
    </svg>
  </div>
  <h1>Check your email</h1>
  <p class="sub">We sent a 6-digit code to</p>
  <div class="email">{{ user_email }}</div>
  {% if messages %}
  <div class="messages">
    {% for message in messages %}
    <div class="message message-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <input type="text" name="otp" class="otp-input" placeholder="000000" maxlength="6" autocomplete="one-time-code" autofocus inputmode="numeric" pattern="[0-9]{6}">
    <button type="submit" class="btn">Verify & Sign In</button>
  </form>
  <div class="timer">OTP expires in <span id="countdown">10:00</span></div>
  <a href="{% url 'login' %}" class="back">← Back to login</a>
</div>
<script>
let seconds = 600;
const el = document.getElementById('countdown');
const timer = setInterval(() => {
  seconds--;
  const m = Math.floor(seconds / 60).toString().padStart(2,'0');
  const s = (seconds % 60).toString().padStart(2,'0');
  el.textContent = m + ':' + s;
  if (seconds <= 0) { clearInterval(timer); el.textContent = 'Expired'; el.style.color = '#a32d2d'; }
}, 1000);
</script>
</body>
</html>
